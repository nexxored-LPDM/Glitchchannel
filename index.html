<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLITCH CHANNEL</title>

<style>
:root{
  --bg:#0a0a0c;
  --green:#39FF6A;
  --dim:#8a8a8a;
  --line:#1f1f24;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:var(--bg);
  color:white;
  font-family: monospace;
  overflow:hidden;
}

/* ruido leve */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.06;
  pointer-events:none;
}

.container{
  text-align:center;
  z-index:2;
}

/* título glitch */
h1{
  font-size:44px;
  letter-spacing:3px;
  margin-bottom:10px;
  position:relative;
}

h1::before,
h1::after{
  content:"GLITCH CHANNEL";
  position:absolute;
  left:0;
  width:100%;
  overflow:hidden;
}

h1::before{
  color:var(--green);
  top:-2px;
  animation:glitch1 2s infinite linear alternate;
}

h1::after{
  color:#ff2e88;
  top:2px;
  animation:glitch2 2s infinite linear alternate;
}

@keyframes glitch1{
  0%{transform:translate(0);}
  20%{transform:translate(-2px,1px);}
  40%{transform:translate(2px,-1px);}
  60%{transform:translate(-1px,0);}
  100%{transform:translate(0);}
}

@keyframes glitch2{
  0%{transform:translate(0);}
  25%{transform:translate(2px,0);}
  50%{transform:translate(-2px,1px);}
  100%{transform:translate(0);}
}

/* botón */
button{
  margin-top:25px;
  background:transparent;
  border:1px solid var(--green);
  color:var(--green);
  padding:14px 26px;
  cursor:pointer;
  letter-spacing:2px;
  transition:.2s;
}

button:hover{
  background:var(--green);
  color:black;
}

/* estado */
#status{
  margin-top:18px;
  color:var(--dim);
  font-size:13px;
}

/* live dot */
.live{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-top:20px;
  color:var(--green);
  font-size:12px;
  letter-spacing:2px;
}

.dot{
  width:6px;
  height:6px;
  background:var(--green);
  border-radius:50%;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1; transform:scale(1);}
  50%{opacity:.3; transform:scale(0.7);}
}
</style>
</head>

<body>

<div class="container">
  <h1>GLITCH CHANNEL</h1>

  <div class="live"><span class="dot"></span>LIVE SIGNAL</div>

  <audio id="radio" preload="none">
    <source src="https://stream.laut.fm/glitch" type="audio/mpeg">
  </audio>

  <div>
    <button id="btn">PLAY</button>
  </div>

  <div id="status">OFFLINE</div>
</div>

<script>
const radio = document.getElementById("radio");
const btn = document.getElementById("btn");
const status = document.getElementById("status");

let playing = false;

btn.addEventListener("click", async () => {
  try {
    if (!playing) {
      await radio.play();
      btn.textContent = "PAUSE";
      status.textContent = "CONNECTING...";
    } else {
      radio.pause();
      btn.textContent = "PLAY";
      status.textContent = "OFFLINE";
    }
    playing = !playing;
  } catch (e) {
    status.textContent = "STREAM ERROR";
  }
});

radio.addEventListener("playing", () => {
  status.textContent = "GLITCH RADIO — LIVE";
});

radio.addEventListener("waiting", () => {
  status.textContent = "BUFFERING...";
});

radio.addEventListener("error", () => {
  status.textContent = "CONNECTION LOST — RETRYING";
  setTimeout(() => {
    radio.load();
  }, 3000);
});
</script>

</body>
</html>
